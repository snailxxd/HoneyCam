# ==========================================
# HoneyCam — Camera Honeypot Configuration
# ==========================================

spring.application.name=HoneyCam

# Server port (use env override in production)
server.port=${HONEYCAM_HTTP_PORT:8081}

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging
logging.level.com.example.honeycam=DEBUG
logging.level.org.springframework.security=INFO

# Honeypot-specific settings
honeycam.log.dir=logs
honeycam.camera.brand=Hikvision
honeycam.camera.model=DS-2CD2043G2-I
honeycam.auth.fake-success-rate=0.35
honeycam.interaction.ptz-enabled=true
honeycam.panorama.mode=auto
honeycam.panorama.video-url=/media/360-demo.mp4
honeycam.panorama.image-url=https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg
honeycam.deception.preview-latency-ms-min=300
honeycam.deception.preview-latency-ms-max=1400
honeycam.interaction.auto-patrol-enabled=false
honeycam.interaction.auto-patrol.pan-degrees=35
honeycam.interaction.auto-patrol.tilt-degrees=8
honeycam.interaction.auto-patrol.cycle-seconds=18

# Maximum session tracking per IP
honeycam.session.max-per-ip=50
honeycam.rtsp.port=${HONEYCAM_RTSP_PORT:554}
