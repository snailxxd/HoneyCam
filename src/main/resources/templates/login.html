<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${brand} + ' - Login'">IP Camera - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #f2f5f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2a36;
        }
        .login-container {
            background: #ffffff;
            border: 1px solid #d7e1ea;
            border-radius: 6px;
            padding: 34px 30px;
            width: 380px;
            box-shadow: 0 8px 28px rgba(18, 46, 78, 0.12);
        }
        .login-header {
            text-align: center;
            margin-bottom: 22px;
        }
        .login-header h1 {
            font-size: 24px;
            color: #14508f;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 13px;
            color: #6d7c8c;
        }
        .login-subtitle {
            text-align: center;
            font-size: 12px;
            color: #7f8fa0;
            margin-bottom: 18px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #5f6f80;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c8d5e1;
            border-radius: 4px;
            background: #fff;
            color: #243140;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #2a78c5;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(180deg, #2f7ec8, #1f66ab);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .btn-login:hover {
            filter: brightness(1.05);
        }
        .error-message {
            background: #fff4f4;
            border: 1px solid #ffc9c9;
            color: #b43d3d;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 14px;
            font-size: 13px;
            text-align: center;
        }
        .notice-message {
            background: #eef8ff;
            border: 1px solid #b9dff7;
            color: #2d6f99;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 14px;
            font-size: 13px;
            text-align: center;
        }
        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 11px;
            color: #8d9baa;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 th:text="${brand}">IP Camera</h1>
            <p th:text="${modelName}">NC-360</p>
        </div>
        <div class="login-subtitle">Network Camera Web Client</div>

        <div th:if="${error}" class="error-message" th:text="${error}">
            Invalid username or password.
        </div>
        <div th:if="${notice}" class="notice-message" th:text="${notice}">
            Login accepted. Redirecting to live view...
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer">
            &copy; 2026 Network Camera Firmware v5.8.1
        </div>
    </div>
</body>
</html>
