<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate"/>
    <meta http-equiv="Expires" content="0"/>
    <meta name="format-detection" content="telephone=no"/>
    <title th:text="Login"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: none;
        }
        html, body {
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            background-color: #FFFFFF;
        }
        li { list-style: none; }
        a {
            color: #FFFFFF;
            text-decoration: none;
        }
        a:hover, a:focus {
            color: #FFFFFF;
            outline: 0;
        }

        /* ── Login page ───────────────────────────── */
        .login-body {
            min-width: 1024px;
        }

        /* ── Top bar ──────────────────────────────── */
        .login .top {
            height: 120px;
        }
        .login .top .logo {
            float: left;
            margin-left: 30px;
            margin-top: 72px;
            width: 120px;
            height: 40px;
            background: url('/images/logo.png') center center no-repeat;
        }
        .login .top .language {
            float: right;
            margin-right: 30px;
            margin-top: 65px;
        }
        .login .top .language-show {
            position: relative;
            width: 130px;
            height: 23px;
            line-height: 23px;
            cursor: pointer;
            background: url('/images/login-icons.png') 0 -22px no-repeat;
        }
        .login .top .current-language {
            display: inline-block;
            width: 90px;
            padding-left: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #A0A0A0;
            font-size: 12px;
        }
        .login .top .language-list {
            display: none;
            position: absolute;
            width: 124px;
            padding: 2px;
            overflow: auto;
            overflow-x: hidden;
            background-color: #FFFFFF;
            border: 1px solid #CECECE;
            z-index: 9999;
        }

        /* ── Middle area ──────────────────────────── */
        .login .middle {
            width: 100%;
            height: 400px;
            border-collapse: collapse;
        }
        .login .login-l {
            height: 400px;
            background: url('/images/login-bg.png') repeat-x;
        }
        .login .login-m {
            width: 1024px;
            height: 400px;
            background: url('/images/login.jpg') no-repeat;
        }
        .login .login-r {
            height: 400px;
            background: url('/images/login-bg.png') repeat-x;
        }

        /* ── Login card (floated right) ───────────── */
        .login .login-part {
            float: right;
            width: 275px;
            height: 280px;
            margin-right: 50px;
            border: 1px solid #D5D5D5;
            border-radius: 5px;
            background-color: #FFFFFF;
        }
        .login .line {
            border-top: 2px solid #D8171E;
            border-radius: 5px;
        }

        /* ── Input fields ─────────────────────────── */
        .login-input {
            width: 190px;
            height: 16px;
            border: 1px solid #CFCFCF;
            border-radius: 3px;
            padding: 6px;
            padding-left: 38px;
            font-size: 13px;
            font-family: Arial, Helvetica, sans-serif;
            outline: none;
        }
        .login-input:focus {
            border-color: #66AFE9;
        }

        /* ── Error area ───────────────────────────── */
        .login .login-error {
            height: 45px;
            margin-top: 5px;
            margin-left: 22px;
        }
        .login .inputValidTip {
            white-space: normal;
            font-size: 12px;
        }
        .login .inputValidTip i.error {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: url('/images/login-icons.png') -48px 0 no-repeat;
            vertical-align: middle;
            margin-right: 4px;
        }
        .login .inputValidTip label {
            color: #D8171E;
            vertical-align: middle;
        }

        /* ── Username row ─────────────────────────── */
        .login .login-user {
            position: relative;
            margin-top: 10px;
            margin-left: 22px;
        }
        .login .icon-user {
            display: inline-block;
            position: absolute;
            left: 8px;
            top: 7px;
            width: 22px;
            height: 18px;
            background: #FFFFFF url('/images/login-icons.png') 0 2px no-repeat;
            border-right: 1px solid #CFCFCF;
        }

        /* ── Password row ─────────────────────────── */
        .login-item {
            position: relative;
            margin-top: 18px;
            margin-left: 22px;
        }
        .login .icon-pass {
            display: inline-block;
            position: absolute;
            left: 8px;
            top: 7px;
            width: 22px;
            height: 18px;
            background: #FFFFFF url('/images/login-icons.png') -24px 1px no-repeat;
            border-right: 1px solid #CFCFCF;
        }
        .login-item.bottom {
            margin-top: 0;
        }

        /* ── Forgot password link ─────────────────── */
        .pwd-link {
            display: inline-block;
            float: right;
            color: #7F7F7F;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 24px;
            margin-right: 20px;
        }
        .pwd-link:hover {
            color: #D8171E;
        }

        /* ── Login button ─────────────────────────── */
        .btn {
            display: inline-block;
            padding: 9px 12px;
            margin: 2px;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-image: none;
            background-color: #FFFFFF;
            border: 0;
            border-radius: 4px;
            -webkit-appearance: button;
            font-family: Arial, Helvetica, sans-serif;
        }
        .btn-primary {
            color: #FFFFFF;
            background-color: #D71920;
            border: 0;
        }
        .login .login-btn {
            width: 235px;
            margin-top: 22px;
            font-size: 14px;
        }

        .login .inputValidTip i.success {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: #5cb85c;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
            position: relative;
        }
        .login .inputValidTip i.success::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 3px;
            width: 4px;
            height: 7px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .login .inputValidTip label.notice {
            color: #5cb85c;
            vertical-align: middle;
        }

        /* ── Footer ───────────────────────────────── */
        .footer {
            height: 24px;
            line-height: 24px;
            text-align: center;
            color: #A0A0A0;
            padding-top: 30px;
        }

        /* ── Placeholder override ─────────────────── */
        .placeholder {
            height: 15px;
            line-height: 15px;
            color: #C0C0C0;
            position: absolute;
            z-index: 1000;
            cursor: text;
        }
    </style>
</head>
<body class="login-body">

<div class="login" id="login">

    <!-- ── Top bar: logo + language ──────────────── -->
    <div class="top">
        <div class="logo"></div>
        <div class="language">
            <div class="language-show" id="languageShow">
                <span class="current-language" id="currentLanguage">English</span>
            </div>
            <div class="language-list" id="languageList" style="display:none;">
            </div>
        </div>
    </div>

    <!-- ── Middle area: bg + login card ──────────── -->
    <table cellspacing="0" cellpadding="0" border="0" class="middle">
        <tr>
            <td class="login-l">&nbsp;</td>
            <td class="login-m">
                <div class="login-part">
                    <!-- Red top line -->
                    <div class="line"></div>

                    <!-- Error message (fixed height — never shifts layout) -->
                    <div class="login-error">
                        <div class="inputValidTip" th:if="${error}">
                            <i class="error"></i>
                            <label th:text="${error}">Invalid username or password.</label>
                        </div>
                        <div class="inputValidTip" th:if="${notice}">
                            <i class="success"></i>
                            <label class="notice" th:text="${notice}">Login accepted.</label>
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="login-user">
                        <input type="text" class="login-input" id="username"
                               name="username" maxlength="32"
                               autocomplete="off" required/>
                        <i class="icon-user"></i>
                    </div>

                    <!-- Password -->
                    <div class="login-item">
                        <input type="password" class="login-input" id="password"
                               name="password" maxlength="16"
                               onpaste="return false" required/>
                        <i class="icon-pass"></i>
                    </div>

                    <!-- Forgot password + Login button -->
                    <div class="login-item bottom">
                        <span class="pwd-link">Forgot Password?</span>
                        <form th:action="@{/login}" method="post" autocomplete="off" id="loginForm">
                            <input type="hidden" name="username" id="usernameHidden"/>
                            <input type="hidden" name="password" id="passwordHidden"/>
                            <button type="submit" class="btn btn-primary login-btn">
                                <label>Login</label>
                            </button>
                        </form>
                    </div>
                </div>
            </td>
            <td class="login-r">&nbsp;</td>
        </tr>
    </table>

    <!-- ── Footer ────────────────────────────────── -->
    <div class="footer" id="footer">
        &copy; 2022 Hikvision Digital Technology Co., Ltd. All Rights Reserved.
    </div>
</div>

<!-- ── Form submit handler ──────────────────────── -->
<script>
    document.getElementById('loginForm').addEventListener('submit', function() {
        document.getElementById('usernameHidden').value =
            document.getElementById('username').value;
        document.getElementById('passwordHidden').value =
            document.getElementById('password').value;
    });

    /* Language dropdown toggle */
    (function() {
        var show = document.getElementById('languageShow');
        var list = document.getElementById('languageList');
        var langs = ['English'];
        var html = '';
        for (var i = 0; i < langs.length; i++) {
            html += '<div class="out" data-lang="' + langs[i] + '" style="width:119px;padding-left:5px;height:20px;line-height:20px;cursor:pointer;color:#A0A0A0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + langs[i] + '</div>';
        }
        list.innerHTML = html;

        show.addEventListener('click', function(e) {
            e.stopPropagation();
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
            list.style.position = 'absolute';
            list.style.right = '30px';
            list.style.top = '95px';
        });
        list.addEventListener('click', function(e) {
            var lang = e.target.getAttribute('data-lang');
            if (lang) {
                document.getElementById('currentLanguage').textContent = lang;
                // Highlight selected
                var items = list.querySelectorAll('div');
                for (var i = 0; i < items.length; i++) {
                    if (items[i].textContent === lang) {
                        items[i].style.background = '#d71920';
                        items[i].style.color = '#FFFFFF';
                    } else {
                        items[i].style.background = '';
                        items[i].style.color = '#A0A0A0';
                    }
                }
            }
            list.style.display = 'none';
        });
        document.addEventListener('click', function() {
            list.style.display = 'none';
        });
    })();
</script>

</body>
</html>
