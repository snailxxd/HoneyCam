<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Error</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico"/>
    <style>
        * { margin:0; padding:0; }
        body { font: 12px Arial,Helvetica,sans-serif; background:#f5f5f5; }
        .header { height:44px; background:#202124; line-height:44px; padding:0 20px; }
        .header .logo { color:#fff; font-size:14px; }
        .content { padding:40px; text-align:center; }
        .code { font-size:48px; color:#d71920; font-weight:bold; }
        .msg { font-size:14px; color:#666; margin-top:10px; }
    </style>
</head>
<body>
    <div class="header"><span class="logo">IP Camera</span></div>
    <div class="content">
        <div class="code" th:text="${status}">404</div>
        <div class="msg">The requested resource is not available.</div>
    </div>
</body>
</html>
