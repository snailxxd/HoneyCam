<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title th:text="${brand} + ' — Live View'">IP Camera — Live View</title>
    <link rel="stylesheet" th:href="@{/css/camera.css}">
</head>
<body>

    <!-- ======== Header Bar ======== -->
    <div class="header">
        <div>
            <span class="header-brand" th:text="${brand}">IP Camera</span>
            <span class="header-model" th:text="${modelName}">NC-360</span>
        </div>
        <div class="header-right">
            <span><span class="header-dot"></span> LIVE</span>
            <span th:text="${#dates.format(new java.util.Date(), 'yyyy-MM-dd')}">2026-06-02</span>
            <span id="headerTime">--:--:--</span>
        </div>
    </div>

    <!-- ======== 360° Viewport ======== -->
    <div class="viewport" id="viewport"></div>

    <!-- ======== On-Screen Display ======== -->
    <div class="osd">
        <div>PAN  <span id="osdPan">0.0°</span></div>
        <div>TILT <span id="osdTilt">0.0°</span></div>
        <div>ZOOM <span id="osdZoom">75.0°</span></div>
        <div id="osdTime" style="margin-top:4px;opacity:0.6;">--:--:--</div>
    </div>

    <!-- ======== Drag Hint ======== -->
    <div class="drag-hint" id="dragHint">
        &#x1F5B1; Drag to pan/tilt &bull; Scroll to zoom &bull; Arrow keys to move
    </div>

    <!-- ======== PTZ Control Panel ======== -->
    <div class="ptz-panel" id="ptzPanel">
        <!-- Direction pad -->
        <div class="ptz-pad">
            <button class="ptz-btn ptz-up"    id="btnTiltUp"   title="Tilt Up">&#x25B2;</button>
            <button class="ptz-btn ptz-left"  id="btnPanLeft"  title="Pan Left">&#x25C0;</button>
            <button class="ptz-btn ptz-right" id="btnPanRight" title="Pan Right">&#x25B6;</button>
            <button class="ptz-btn ptz-down"  id="btnTiltDown" title="Tilt Down">&#x25BC;</button>
        </div>
        <!-- Zoom -->
        <div class="ptz-zoom-group">
            <button class="ptz-zoom-btn" id="btnZoomIn"  title="Zoom In">+</button>
            <span class="ptz-zoom-label">ZOOM</span>
            <button class="ptz-zoom-btn" id="btnZoomOut" title="Zoom Out">&minus;</button>
        </div>
        <!-- Speed indicator -->
        <div class="ptz-speed" id="btnSpeed" title="Click to cycle speed" style="cursor:pointer;">
            <span class="ptz-speed-dot active"></span>
            <span class="ptz-speed-dot"></span>
            <span class="ptz-speed-dot"></span>
        </div>
    </div>

    <!-- ======== Three.js CDN ======== -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js">
    </script>

    <!-- ======== HoneyCam Viewer ======== -->
    <script th:src="@{/js/camera-viewer.js}"></script>

    <!-- ======== Header clock ======== -->
    <script>
        (function tick() {
            document.getElementById('headerTime').textContent =
                new Date().toTimeString().slice(0, 8);
            setTimeout(tick, 1000);
        })();
    </script>
</body>
</html>
