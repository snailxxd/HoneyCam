<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${brand} + ' - Live View'">IP Camera - Live View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .camera-container {
            text-align: center;
        }
        .camera-viewport {
            width: 640px;
            height: 480px;
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
        }
        .controls {
            margin-top: 16px;
        }
        .controls button {
            padding: 8px 16px;
            margin: 0 4px;
            background: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .controls button:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="camera-container">
        <h2 th:text="${brand} + ' — Live View'">IP Camera — Live View</h2>
        <p style="color:#888;font-size:13px;margin:8px 0;" th:text="${modelName}">NC-360</p>
        <div class="camera-viewport" id="cameraView">
            [360° Camera View — Three.js Placeholder]
        </div>
        <div class="controls">
            <button onclick="handlePan(-10)">◀ Pan Left</button>
            <button onclick="handleTilt(-10)">▲ Tilt Up</button>
            <button onclick="handleTilt(10)">▼ Tilt Down</button>
            <button onclick="handlePan(10)">Pan Right ▶</button>
            <button onclick="handleZoom(-5)">Zoom In</button>
            <button onclick="handleZoom(5)">Zoom Out</button>
        </div>
    </div>

    <script>
        // Placeholder PTZ handlers — will be replaced with Three.js implementation
        function handlePan(delta) {
            fetch('/api/interaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ actionType: 'PAN', deltaX: delta, deltaY: 0 })
            });
            console.log('Pan:', delta);
        }
        function handleTilt(delta) {
            fetch('/api/interaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ actionType: 'TILT', deltaX: 0, deltaY: delta })
            });
            console.log('Tilt:', delta);
        }
        function handleZoom(delta) {
            fetch('/api/interaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ actionType: 'ZOOM', deltaX: 0, deltaY: 0, zoomLevel: delta })
            });
            console.log('Zoom:', delta);
        }
    </script>
</body>
</html>
